<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever With You ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(
-45deg,
#ff758c,
#ff7eb3,
#ffc3a0,
#ffafbd
);

background-size:400% 400%;

animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

width:90%;

max-width:400px;

padding:30px;

text-align:center;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

border-radius:30px;

box-shadow:0 10px 40px rgba(0,0,0,.2);

color:white;

z-index:10;

}

.photo{

width:170px;

height:170px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:5px solid white;

box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

h1{

margin-top:20px;

font-size:2rem;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.05);

}

}

.names{

font-size:1.5rem;

font-weight:bold;

margin-top:12px;

}

.message{

margin-top:15px;

font-size:1rem;

line-height:1.8;

}

.counter-box{

margin-top:25px;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.15);

}

.counter-title{

font-size:1rem;

margin-bottom:10px;

}

#counter{

font-size:1.4rem;

font-weight:bold;

}

.heart{

position:absolute;

bottom:-50px;

color:white;

animation:float linear infinite;

opacity:.8;

}

@keyframes float{

0%{

transform:translateY(0) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(-110vh) rotate(360deg);

opacity:0;

}

}

@media(max-width:500px){

.photo{

width:140px;

height:140px;

}

h1{

font-size:1.7rem;

}

.names{

font-size:1.3rem;

}

.message{

font-size:.95rem;

}

#counter{

font-size:1.15rem;

}

}

</style>

</head>

<body>

<div class="card">

<div class="photo">

<img src="https://th.bing.com/th/id/R.e4f42f4cb086578da6a4ccdc1a825cae?rik=pVJl1f7rynjZIw&riu=http%3a%2f%2fwww.whoa.in%2f201604-Whoa%2fphotoshoot-love-heart-created-by-young-couple-hand-hd-images-photos-fb-images-free-download.jpg&ehk=uslkt%2f08RkbHTmPHMsQom57wTD0OGZC7TgeT85XTXxo%3d&risl=&pid=ImgRaw&r=0" alt="Couple Photo">

</div>

<h1>❤️ Forever With You ❤️</h1>

<div class="names">

Arafat ❤️ Anaya

</div>

<div class="message">

Every moment with you is special.

You are my happiness,

my peace,

and my forever.

💖 I Love You 💖

</div>

<div class="counter-box">

<div class="counter-title">

⏳ Together Since

14 February 2025

</div>

<div id="counter">

Loading...

</div>

</div>

</div>


<script>

// Love Counter

const startDate = new Date("2025-02-14T00:00:00");

function updateCounter(){

const now = new Date();

const diff = now - startDate;

const days=Math.floor(diff/(1000*60*60*24));

const hours=Math.floor(
(diff/(1000*60*60))%24
);

const mins=Math.floor(
(diff/(1000*60))%60
);

const secs=Math.floor(
(diff/1000)%60
);

document.getElementById("counter").innerHTML=

`${days} Days <br>
${hours} Hours ${mins} Minutes ${secs} Seconds`;

}

setInterval(updateCounter,1000);

updateCounter();


// Floating Hearts

for(let i=0;i<35;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=

(Math.random()*20+15)+"px";

heart.style.animationDuration=

(Math.random()*5+5)+"s";

heart.style.animationDelay=

Math.random()*5+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
